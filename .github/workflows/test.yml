name: test

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: install just
        uses: extractions/setup-just@v3

      - name: install python
        run: uv python install 3.13

      - name: sync dependencies
        run: uv sync --group dev

      - name: just test
        run: just test
